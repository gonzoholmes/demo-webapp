name: App Pipeline

run-name: "${{ github.event_name == 'pull_request' && format('build+scan · {0}', github.event.pull_request.title) || format('deploy · {0}', github.event.head_commit.message) }}"

on:
  pull_request:
    branches: [main]
    paths: ["app/**"]
  push:
    branches: [main]
    paths: ["app/**"]

jobs:
  build-and-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: app
          push: false
          load: true
          tags: starsigns-app:pr-${{ github.event.pull_request.number }}

      - name: Scan image for critical/high vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: starsigns-app:pr-${{ github.event.pull_request.number }}
          severity: CRITICAL,HIGH
          exit-code: "1"

  build-push-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::375066138214:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/ecr-demo-webapp:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/ecr-demo-webapp:latest

      - name: Point manifest at the new image tag
        run: |
          sed -i "s|image: .*ecr-demo-webapp:latest|image: ${{ steps.ecr-login.outputs.registry }}/ecr-demo-webapp:${{ github.sha }}|" k8s/deployment.yaml

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name eks-demo-webapp --region us-east-1

      - name: Deploy
        run: kubectl apply -f k8s/deployment.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/starsigns-app --timeout=180s
