<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Star Sign Finder</title>
  <style>
    body { font-family: sans-serif; max-width: 420px; margin: 60px auto; text-align: center; background: #2fbfea; }
    input, select { display: block; width: 100%; margin: 8px 0; padding: 8px; box-sizing: border-box; }
    .birthday { display: flex; gap: 8px; }
    .birthday select { flex: 1; }
    button { padding: 8px 16px; }
    .result { margin-top: 24px; }
    .emoji { font-size: 64px; }
  </style>
</head>
<body>
  <h1>What's your star sign?</h1>
  <form method="post">
    <input type="text" name="name" placeholder="First name" required>
    <div class="birthday">
      <select name="day" required>
        <option value="" disabled selected>Day</option>
        {% for d in range(1, 32) %}
        <option value="{{ d }}">{{ d }}</option>
        {% endfor %}
      </select>
      <select name="month" required>
        <option value="" disabled selected>Month</option>
        {% for m, label in [(1,"Jan"),(2,"Feb"),(3,"Mar"),(4,"Apr"),(5,"May"),(6,"Jun"),(7,"Jul"),(8,"Aug"),(9,"Sep"),(10,"Oct"),(11,"Nov"),(12,"Dec")] %}
        <option value="{{ m }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit">Find out</button>
  </form>

  {% if result %}
  <div class="result">
    <div class="emoji">{{ result.emoji }}</div>
    <h2>{{ result.name }}, you're a {{ result.sign }}!</h2>
    <p>{{ result.count }} other {{ result.sign }} on this site so far.</p>
  </div>
  {% endif %}
</body>
</html>
