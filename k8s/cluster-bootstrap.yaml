# One-time bootstrap, apply manually — github-actions-deploy has no
# cluster-scoped permissions, so CI can't manage these resources:
#   kubectl apply -f k8s/cluster-bootstrap.yaml

---
# Intentional lab misconfiguration: bound to cluster-admin.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: starsigns-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: starsigns-app-cluster-admin
subjects:
  - kind: ServiceAccount
    name: starsigns-app
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

---
# EKS Auto Mode doesn't create this automatically — must be defined explicitly.
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
spec:
  controller: eks.amazonaws.com/alb
