# One-time bootstrap — apply manually with your own credentials:
#   kubectl apply -f k8s/cluster-bootstrap.yaml
# github-actions-deploy is scoped to namespace-level edit only (no
# cluster-scoped permissions), so CI can't manage any of these resources.

---
# Intentional lab misconfiguration: bound to cluster-admin.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: starsigns-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: starsigns-app-cluster-admin
subjects:
  - kind: ServiceAccount
    name: starsigns-app
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

---
# EKS Auto Mode installs the ALB controller + CRDs, but does not create
# this IngressClass automatically — it must be defined explicitly, same
# as a StorageClass still needs defining even once a CSI driver exists.
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
spec:
  controller: eks.amazonaws.com/alb
