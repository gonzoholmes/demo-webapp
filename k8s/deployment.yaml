# starsigns-secret not committed — create before applying:
#   kubectl create secret generic starsigns-secret \
#     --from-literal=MONGO_URI="mongodb://starsigns_app:$(terraform -chdir=../terraform output -raw mongodb_app_password)@$(terraform -chdir=../terraform output -raw mongodb_private_ip):27017/starsigns" \
#     --dry-run=client -o yaml | kubectl apply -f -
# Re-run after every terraform apply (IP/password change on redeploy).
#
# Requires k8s/cluster-bootstrap.yaml applied first (ServiceAccount + alb IngressClass).
#
# The Ingress's wafv2-acl-arn annotation also goes stale on every fresh
# terraform apply — the Web ACL gets a new ARN each time it's recreated.
# Update it with: terraform -chdir=../terraform output -raw waf_web_acl_arn

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starsigns-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starsigns-app
  template:
    metadata:
      labels:
        app: starsigns-app
    spec:
      serviceAccountName: starsigns-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: starsigns-app
          image: 375066138214.dkr.ecr.us-east-1.amazonaws.com/ecr-demo-webapp:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: starsigns-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: starsigns-app
spec:
  selector:
    app: starsigns-app
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: starsigns-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-east-1:375066138214:regional/webacl/starsigns-app-waf/30207189-a57f-4d8f-af4f-a005cc2dd034
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: starsigns-app
                port:
                  number: 80
