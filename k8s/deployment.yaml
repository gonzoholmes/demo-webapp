# starsigns-secret not committed — create before applying (re-run after
# every terraform apply, since IP/password change on redeploy):
#   kubectl create secret generic starsigns-secret \
#     --from-literal=MONGO_URI="mongodb://starsigns_app:$(terraform -chdir=../terraform output -raw mongodb_app_password)@$(terraform -chdir=../terraform output -raw mongodb_private_ip):27017/starsigns" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Requires k8s/cluster-bootstrap.yaml applied first.
#
# The Ingress's wafv2-acl-arn annotation also goes stale on every fresh
# terraform apply — the Web ACL gets a new ARN each time it's recreated.
# Update it with: terraform -chdir=../terraform output -raw waf_web_acl_arn

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starsigns-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starsigns-app
  template:
    metadata:
      labels:
        app: starsigns-app
    spec:
      serviceAccountName: starsigns-app
      containers:
        - name: starsigns-app
          image: 375066138214.dkr.ecr.us-east-1.amazonaws.com/ecr-demo-webapp:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: starsigns-secret

---
apiVersion: v1
kind: Service
metadata:
  name: starsigns-app
spec:
  selector:
    app: starsigns-app
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: starsigns-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-east-1:375066138214:regional/webacl/starsigns-app-waf/b9786d21-4c9c-4ccd-9590-3c2fe21304a2
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: starsigns-app
                port:
                  number: 80
