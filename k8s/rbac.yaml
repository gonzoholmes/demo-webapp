# One-time bootstrap — apply manually with your own credentials:
#   kubectl apply -f k8s/rbac.yaml
# github-actions-deploy is scoped to namespace-level edit only (no
# cluster-scoped RBAC permissions), so CI can't manage this resource.

---
# Intentional lab misconfiguration: bound to cluster-admin.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: starsigns-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: starsigns-app-cluster-admin
subjects:
  - kind: ServiceAccount
    name: starsigns-app
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
